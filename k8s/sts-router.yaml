apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sts-router
spec:
  serviceName: svc-router
  replicas: 1
  selector:
    matchLabels:
      app: router
  template:
    metadata:
      labels:
        app: router
    spec:
      containers:
        - name: router
          image:  gcr.io/${GCP_PROJECT_ID}/router:latest
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: router-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: router-data
      spec:
        accessModes: <placeholder>
        storageClassName: standard
        resources:
          requests:
            storage: 1Gi
